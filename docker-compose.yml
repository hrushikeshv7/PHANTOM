
services:

  # ── PostgreSQL ─────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: phantom_db
    restart: always
    environment:
      POSTGRES_DB:       phantom_db
      POSTGRES_USER:     phantom_user
      POSTGRES_PASSWORD: phantom_pass_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantom_user -d phantom_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: phantom_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────
  backend:
    build: ./backend
    container_name: phantom_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://phantom_user:phantom_pass_2024@db/phantom_db
      REDIS_URL:    redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: phantom_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
